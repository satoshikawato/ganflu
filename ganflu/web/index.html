<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ganflu Web</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --panel: #ffffff;
            --text: #1d2733;
            --muted: #64748b;
            --line: #d6dde8;
            --accent: #176b87;
            --accent-strong: #0f4c61;
            --accent-soft: #e6f4f7;
            --danger: #9f2832;
            --shadow: 0 14px 34px rgba(30, 41, 59, 0.08);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.1;
            letter-spacing: 0;
        }
        .status {
            min-width: 150px;
            text-align: right;
            color: var(--muted);
            font-size: 14px;
            white-space: nowrap;
        }
        main {
            display: grid;
            grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
            gap: 18px;
            padding: 18px;
            max-width: 1440px;
            margin: 0 auto;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            min-width: 0;
        }
        form.panel {
            padding: 18px;
            align-self: start;
        }
        .field {
            display: grid;
            gap: 7px;
            margin-bottom: 14px;
        }
        label {
            font-size: 13px;
            font-weight: 700;
            color: #334155;
        }
        input[type="text"],
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            background: #ffffff;
            font: inherit;
            font-size: 14px;
        }
        input[type="text"],
        select {
            height: 38px;
            padding: 0 10px;
        }
        input[type="file"] {
            width: 100%;
            font: inherit;
            font-size: 13px;
        }
        textarea {
            min-height: 220px;
            resize: vertical;
            padding: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            line-height: 1.45;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .check-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 2px 0 16px;
            color: #334155;
            font-size: 14px;
        }
        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #ffffff;
            color: var(--text);
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            min-height: 38px;
            padding: 0 12px;
        }
        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }
        button.primary:hover {
            background: var(--accent-strong);
        }
        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .results {
            display: grid;
            grid-template-rows: auto auto minmax(360px, 1fr) auto;
            overflow: hidden;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0;
            border-bottom: 1px solid var(--line);
        }
        .summary div {
            min-height: 70px;
            padding: 13px 14px;
            border-right: 1px solid var(--line);
            overflow: hidden;
        }
        .summary div:last-child {
            border-right: 0;
        }
        .summary span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .summary strong {
            display: block;
            font-size: 15px;
            line-height: 1.3;
            overflow-wrap: anywhere;
        }
        .output-head {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            padding: 10px;
            min-width: 0;
        }
        .tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            min-width: 0;
        }
        .tab {
            min-height: 32px;
            padding: 0 10px;
            white-space: nowrap;
            font-size: 13px;
        }
        .tab.is-active {
            background: var(--accent-soft);
            border-color: #9ed0d9;
            color: var(--accent-strong);
        }
        #output-text {
            border: 0;
            border-radius: 0;
            min-height: 360px;
            height: 100%;
            background: #fbfcfe;
        }
        .log {
            border-top: 1px solid var(--line);
            padding: 12px 14px;
            min-height: 92px;
            max-height: 190px;
            overflow: auto;
            color: #334155;
            background: #ffffff;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .is-running input,
        .is-running select,
        .is-running textarea {
            cursor: progress;
        }
        footer {
            padding: 0 18px 18px;
            max-width: 1440px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 12px;
        }
        footer a {
            color: var(--accent-strong);
        }
        @media (max-width: 900px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }
            .status {
                text-align: left;
            }
            main {
                grid-template-columns: 1fr;
                padding: 12px;
            }
            .summary {
                grid-template-columns: 1fr 1fr;
            }
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="./vendor/pyodide/v0.29.0/full/pyodide.js"></script>
</head>
<body>
    <header>
        <h1>ganflu Web</h1>
        <div class="status" id="status">Idle</div>
    </header>
    <main>
        <form class="panel" id="run-form">
            <div class="field">
                <label for="fasta-file">FASTA file</label>
                <input id="fasta-file" type="file" accept=".fa,.fasta,.fna,.txt,text/plain">
            </div>
            <div class="field">
                <label for="fasta-text">FASTA text</label>
                <textarea id="fasta-text" spellcheck="false" autocomplete="off"></textarea>
            </div>
            <div class="row">
                <div class="field">
                    <label for="target">Target</label>
                    <select id="target">
                        <option value="IAV">IAV</option>
                        <option value="IBV">IBV</option>
                        <option value="ICV">ICV</option>
                        <option value="IDV">IDV</option>
                    </select>
                </div>
                <div class="field">
                    <label for="output-stem">Output stem</label>
                    <input id="output-stem" type="text" autocomplete="off" placeholder="sample">
                </div>
            </div>
            <div class="field">
                <label for="isolate">Isolate</label>
                <input id="isolate" type="text" autocomplete="off" placeholder="A/Puerto_Rico/8/1934">
            </div>
            <label class="check-row">
                <input id="preserve-original-id" type="checkbox">
                <span>Preserve original IDs</span>
            </label>
            <div class="actions">
                <button class="primary" id="run-button" type="submit">Run annotation</button>
                <button id="clear-button" type="button">Clear</button>
            </div>
        </form>
        <section class="panel results">
            <div class="summary" id="summary"></div>
            <div class="output-head">
                <div class="tabs" id="output-tabs"></div>
                <button id="download-button" type="button" disabled>Download</button>
            </div>
            <textarea id="output-text" readonly spellcheck="false"></textarea>
            <pre class="log" id="log-text"></pre>
        </section>
    </main>
    <footer>
        <a href="./open-source-notices.html">Open Source Notices</a>
    </footer>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
