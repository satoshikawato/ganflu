<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ganflu Web</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f6f8;
            --panel: #ffffff;
            --panel-subtle: #f8fafc;
            --text: #17202a;
            --muted: #697586;
            --line: #d6dee8;
            --line-strong: #c8d3df;
            --accent: #0d6b75;
            --accent-strong: #084c55;
            --success: #237a4b;
            --working: #9a5b10;
            --danger: #aa2636;
            --focus: rgba(13, 107, 117, 0.24);
            --shadow: 0 18px 42px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #eef4f6 0, var(--bg) 340px);
            color: var(--text);
            font-size: 14px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 22px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .brand-mark {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border: 1px solid #b7d7dc;
            border-radius: 8px;
            background: linear-gradient(145deg, #f7feff, #dff1f4);
            color: var(--accent-strong);
            font-size: 17px;
            font-weight: 800;
            line-height: 1;
            flex: 0 0 auto;
        }
        h1 {
            margin: 0;
            font-size: 20px;
            line-height: 1.15;
            letter-spacing: 0;
        }
        .subtitle {
            margin: 3px 0 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.25;
        }
        .status {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            min-width: 150px;
            max-width: min(46vw, 420px);
            min-height: 32px;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }
        .status::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            flex: 0 0 auto;
        }
        .status[data-status="working"]::before {
            background: var(--working);
        }
        .status[data-status="success"]::before {
            background: var(--success);
        }
        .status[data-status="error"]::before {
            background: var(--danger);
        }
        main {
            display: grid;
            grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 1440px;
            margin: 0 auto;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            min-width: 0;
        }
        form.panel {
            padding: 18px;
            align-self: start;
        }
        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 24px;
            margin-bottom: 16px;
        }
        h2 {
            margin: 0;
            font-size: 15px;
            line-height: 1.2;
            letter-spacing: 0;
        }
        .field {
            display: grid;
            gap: 7px;
            margin-bottom: 15px;
        }
        label {
            font-size: 13px;
            font-weight: 700;
            color: #344054;
        }
        input[type="text"],
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            color: var(--text);
            background: #ffffff;
            font: inherit;
            font-size: 14px;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }
        input[type="text"],
        select {
            height: 40px;
            padding: 0 11px;
        }
        input[type="file"] {
            width: 100%;
            font: inherit;
            font-size: 13px;
            color: var(--muted);
        }
        input[type="file"]::file-selector-button {
            min-height: 34px;
            margin-right: 10px;
            padding: 0 12px;
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            background: var(--panel-subtle);
            color: var(--text);
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }
        textarea {
            min-height: 240px;
            resize: vertical;
            padding: 11px 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            line-height: 1.45;
        }
        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus);
            outline: 0;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .check-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 17px;
            color: #344054;
            font-size: 14px;
            user-select: none;
        }
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }
        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #ffffff;
            color: var(--text);
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            min-height: 40px;
            padding: 0 14px;
            transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
        }
        button:hover:not(:disabled) {
            border-color: var(--line-strong);
            background: var(--panel-subtle);
        }
        button:focus-visible {
            box-shadow: 0 0 0 3px var(--focus);
            outline: 0;
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
            flex: 1 1 auto;
        }
        button.primary:hover {
            background: var(--accent-strong);
            border-color: var(--accent-strong);
        }
        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .results {
            display: grid;
            grid-template-rows: auto auto minmax(400px, 1fr) auto;
            overflow: hidden;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0;
            border-bottom: 1px solid var(--line);
            background: var(--panel-subtle);
        }
        .summary div {
            min-height: 74px;
            padding: 14px 15px;
            border-right: 1px solid var(--line);
            overflow: hidden;
        }
        .summary div:last-child {
            border-right: 0;
        }
        .summary span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 9px;
        }
        .summary strong {
            display: block;
            font-size: 16px;
            line-height: 1.3;
            overflow-wrap: anywhere;
        }
        .output-head {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            padding: 10px 12px;
            background: #ffffff;
            min-width: 0;
        }
        .tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            min-width: 0;
            padding: 3px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #edf2f6;
        }
        .tabs:empty::before {
            content: "Output";
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 11px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }
        .tab {
            min-height: 30px;
            padding: 0 11px;
            border-color: transparent;
            background: transparent;
            white-space: nowrap;
            font-size: 13px;
        }
        .tab:hover:not(:disabled) {
            background: #ffffff;
        }
        .tab.is-active {
            background: #ffffff;
            border-color: #ffffff;
            color: var(--accent-strong);
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.10);
        }
        #output-text {
            border: 0;
            border-radius: 0;
            min-height: 400px;
            height: 100%;
            background: #fcfdff;
            color: #182230;
            font-size: 12.5px;
        }
        .log {
            border-top: 1px solid var(--line);
            padding: 13px 15px;
            min-height: 96px;
            max-height: 190px;
            overflow: auto;
            color: #d9e3ea;
            background: #101820;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
        }
        .log:empty::before {
            content: "Log";
            color: #8191a5;
        }
        .is-running input,
        .is-running select,
        .is-running textarea {
            cursor: progress;
        }
        footer {
            padding: 0 20px 20px;
            max-width: 1440px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 12px;
        }
        footer a {
            color: var(--accent-strong);
        }
        @media (max-width: 900px) {
            header {
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 16px;
            }
            .status {
                justify-content: flex-start;
                text-align: left;
                width: 100%;
            }
            main {
                grid-template-columns: 1fr;
                padding: 12px;
                gap: 12px;
            }
            .summary {
                grid-template-columns: 1fr 1fr;
            }
            .output-head {
                align-items: stretch;
                flex-direction: column;
            }
            .row {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 520px) {
            .brand {
                align-items: flex-start;
            }
            .summary {
                grid-template-columns: 1fr;
            }
            .summary div {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }
            .summary div:last-child {
                border-bottom: 0;
            }
            .actions {
                align-items: stretch;
                flex-direction: column;
            }
            button.primary {
                width: 100%;
            }
        }
    </style>
    <script src="./vendor/pyodide/v0.29.0/full/pyodide.js"></script>
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">g</div>
            <div>
                <h1>ganflu Web</h1>
                <p class="subtitle">Genome ANnotator for inFLUenza viruses</p>
            </div>
        </div>
        <div class="status" id="status" data-status="idle">Idle</div>
    </header>
    <main>
        <form class="panel" id="run-form">
            <div class="panel-head">
                <h2>Input</h2>
            </div>
            <div class="field">
                <label for="fasta-file">FASTA file</label>
                <input id="fasta-file" type="file" accept=".fa,.fasta,.fna,.txt,text/plain">
            </div>
            <div class="field">
                <label for="fasta-text">FASTA text</label>
                <textarea id="fasta-text" spellcheck="false" autocomplete="off"></textarea>
            </div>
            <div class="row">
                <div class="field">
                    <label for="target">Target</label>
                    <select id="target">
                        <option value="IAV">IAV</option>
                        <option value="IBV">IBV</option>
                        <option value="ICV">ICV</option>
                        <option value="IDV">IDV</option>
                    </select>
                </div>
                <div class="field">
                    <label for="output-stem">Output stem</label>
                    <input id="output-stem" type="text" autocomplete="off" placeholder="sample">
                </div>
            </div>
            <div class="field">
                <label for="isolate">Isolate</label>
                <input id="isolate" type="text" autocomplete="off" placeholder="A/Puerto_Rico/8/1934">
            </div>
            <label class="check-row">
                <input id="preserve-original-id" type="checkbox">
                <span>Preserve original IDs</span>
            </label>
            <div class="actions">
                <button class="primary" id="run-button" type="submit">Run annotation</button>
                <button id="clear-button" type="button">Clear</button>
            </div>
        </form>
        <section class="panel results">
            <div class="summary" id="summary"></div>
            <div class="output-head">
                <div class="tabs" id="output-tabs"></div>
                <button id="download-button" type="button" disabled>Download</button>
            </div>
            <textarea id="output-text" readonly spellcheck="false" placeholder="Output"></textarea>
            <pre class="log" id="log-text"></pre>
        </section>
    </main>
    <footer>
        <a href="./open-source-notices.html">Open Source Notices</a>
    </footer>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
